[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    online: requires live internet access to a portal (skipped in offline CI)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = --strict-markers --cov=realestate_engine --cov-report=term-missing --cov-report=html --cov-report=xml
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestReturnNotNoneWarning

[coverage:run]
source = realestate_engine
omit =
    */tests/*
    */__pycache__/*
    */migrations/*
    */venv/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
